name: Tests Java - Exercice 13

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Run tests
        working-directory: "03_exercices/Mes exercice/exercice13"
        run: mvn test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-tests-exercice13
          path: |
            03_exercices/Mes exercice/exercice13/target/surefire-reports/
            03_exercices/Mes exercice/exercice13/target/cucumber-report.html
            03_exercices/Mes exercice/exercice13/target/cucumber-report.json
